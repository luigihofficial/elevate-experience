<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Gracias! · ELEVATE Experience</title>
<link rel="icon" type="image/svg+xml" href="logo.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,500&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{--marfil:#F6F1E7;--marfil2:#EFE8DA;--navy:#1C3A5E;--gold:#C9A24B;--goldd:#B98E3C;--muted:#6B7585}
  *{box-sizing:border-box}
  body{margin:0;background:var(--marfil);font-family:'Poppins',sans-serif;color:var(--navy);text-align:center}
  .wrap{max-width:760px;margin:0 auto;padding:36px 18px 60px}
  .check{font-size:2rem}
  h1{font-family:'Playfair Display',serif;font-size:1.9rem;margin:10px 0 4px}
  .sub{color:var(--muted);margin-bottom:26px}
  .ticket-block{max-width:680px;margin:0 auto 26px}
  .blk-title{font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;color:var(--goldd);font-weight:600;margin-bottom:8px;text-align:left}
  .ticket{display:flex;background:var(--marfil);border:2px solid var(--gold);border-radius:18px;overflow:hidden;box-shadow:0 18px 50px rgba(28,58,94,.15);text-align:left}
  .t-main{flex:1;padding:24px 26px}
  .t-kicker{color:var(--goldd);font-size:.72rem;letter-spacing:.22em;font-weight:600}
  .t-title{font-family:'Playfair Display',serif;font-size:1.9rem;line-height:1;margin:6px 0 2px}
  .t-title span{color:var(--goldd)}
  .t-slogan{font-family:'Playfair Display',serif;font-style:italic;color:var(--navy);font-size:.92rem;margin-bottom:12px}
  .t-row{font-size:.84rem;margin:3px 0}
  .t-row b{font-weight:600}
  .t-name{margin-top:12px;padding-top:10px;border-top:1px dashed rgba(28,58,94,.25)}
  .t-name .lbl{font-size:.64rem;letter-spacing:.16em;color:var(--muted);text-transform:uppercase}
  .t-name .val{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700}
  .t-stub{width:196px;background:var(--navy);color:var(--marfil);padding:20px 16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;text-align:center}
  .t-stub .tier{font-family:'Playfair Display',serif;color:var(--gold);font-weight:700;line-height:1}
  .t-stub .plan{font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:#cdd8e6}
  .qr{background:#fff;padding:8px;border-radius:10px;display:inline-block}
  .qr img,.qr canvas{display:block}
  .t-code{font-size:.68rem;letter-spacing:.12em;color:#cdd8e6}
  .t-code b{color:#fff;font-size:.8rem;letter-spacing:.16em}
  .t-actions{display:flex;gap:10px;justify-content:center;margin-top:12px}
  .btn,.btn-sm{border:none;cursor:pointer;font-family:'Poppins';font-weight:600;text-decoration:none;display:inline-block;border-radius:999px}
  .btn{font-size:.95rem;padding:13px 26px}
  .btn-sm{font-size:.88rem;padding:10px 22px}
  .btn-gold{background:var(--gold);color:var(--navy)}
  .btn-ghost{background:transparent;border:1.5px solid var(--navy);color:var(--navy)}
  .footer-actions{margin-top:10px}
  .note{color:var(--muted);font-size:.82rem;margin-top:18px}
  .state{padding:40px 0;color:var(--muted)}
  @media(max-width:560px){.ticket{flex-direction:column}.t-stub{width:100%}}
  /* Impresión: solo el ticket marcado */
  @media print{
    body.printing *{visibility:hidden}
    body.printing .print-target, body.printing .print-target *{visibility:visible}
    body.printing .print-target{position:absolute;left:0;top:0;width:680px;box-shadow:none}
  }
</style>
</head>
<body>
<div class="wrap">
  <div id="state" class="state">Verificando tu compra…</div>

  <div id="ok" style="display:none">
    <div class="check">🎉</div>
    <h1 id="ok-title">¡Gracias!</h1>
    <p class="sub" id="ok-sub">Tu lugar está confirmado. Guarda o descarga tu ticket:</p>
    <div id="tickets"></div>
    <div class="footer-actions"><a class="btn btn-ghost" href="/">Volver al inicio</a></div>
    <p class="note">Presenta cada ticket (o su QR) en la entrada el día del evento.</p>
  </div>

  <div id="fail" style="display:none">
    <h1>No pudimos confirmar tu compra</h1>
    <p class="sub" id="fail-msg">Si crees que es un error, contáctanos en admin@lospoderesdelexito.com</p>
    <a class="btn btn-ghost" href="/#registro">Volver a intentar</a>
  </div>
</div>

<script>
function downloadTicket(el){
  html2canvas(el, { scale: 2, backgroundColor: null }).then(function(canvas){
    const a = document.createElement('a');
    a.download = 'ticket-elevate-experience.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}
function printTicket(el){
  document.body.classList.add('printing');
  el.classList.add('print-target');
  window.print();
  setTimeout(function(){ document.body.classList.remove('printing'); el.classList.remove('print-target'); }, 700);
}
function makeTicket(opts){
  const block = document.createElement('div');
  block.className = 'ticket-block';
  block.innerHTML =
    (opts.blockTitle ? '<div class="blk-title">' + opts.blockTitle + '</div>' : '') +
    '<div class="ticket">' +
      '<div class="t-main">' +
        '<div class="t-kicker">5 AUTORES · 1 ESCENARIO</div>' +
        '<div class="t-title">ELEVATE <span>Experience</span></div>' +
        '<div class="t-slogan">Expande tu mente, activa tu poder</div>' +
        '<div class="t-row"><b>Sábado 11 de julio de 2026</b> · 10:00 a.m. a 2:00 p.m.</div>' +
        '<div class="t-row">Embassy Suites by Hilton — Miami Int\'l Airport</div>' +
        '<div class="t-row">3974 NW S River Dr, Miami, FL 33142</div>' +
        '<div class="t-name"><div class="lbl">Asistente</div><div class="val"></div></div>' +
      '</div>' +
      '<div class="t-stub">' +
        '<div class="tier"></div>' +
        '<div class="plan"></div>' +
        '<div class="qr"></div>' +
        '<div class="t-code">CÓDIGO<br><b></b></div>' +
      '</div>' +
    '</div>' +
    '<div class="t-actions">' +
      '<button class="btn-sm btn-gold dl">Descargar</button>' +
      '<button class="btn-sm btn-ghost pr">Imprimir</button>' +
    '</div>';
  block.querySelector('.t-name .val').textContent = opts.name || 'Asistente ELEVATE';
  const tierEl = block.querySelector('.tier');
  tierEl.textContent = opts.tier;
  tierEl.style.fontSize = opts.tier.length > 4 ? '1.4rem' : '2.1rem';
  block.querySelector('.plan').textContent = opts.planLabel;
  block.querySelector('.t-code b').textContent = opts.code;
  new QRCode(block.querySelector('.qr'), {
    text: 'ELEVATE|' + opts.code + '|' + (opts.name || ''),
    width: 92, height: 92, colorDark: '#1C3A5E', colorLight: '#ffffff'
  });
  const ticketEl = block.querySelector('.ticket');
  block.querySelector('.dl').addEventListener('click', function(){ downloadTicket(ticketEl); });
  block.querySelector('.pr').addEventListener('click', function(){ printTicket(ticketEl); });
  document.getElementById('tickets').appendChild(block);
}

(async function(){
  const params = new URLSearchParams(location.search);
  const stateEl = document.getElementById('state');
  const okEl = document.getElementById('ok');
  const failEl = document.getElementById('fail');
  function fail(msg){ stateEl.style.display='none'; failEl.style.display='block'; if(msg) document.getElementById('fail-msg').textContent = msg; }
  function show(title, sub){ document.getElementById('ok-title').textContent = title; document.getElementById('ok-sub').textContent = sub; stateEl.style.display='none'; okEl.style.display='block'; }

  // GENERAL (gratis) o ticket de ACOMPAÑANTE (guest)
  const _t = params.get('type');
  if (_t === 'general' || _t === 'guest') {
    const tier = params.get('tier') || 'GENERAL';
    makeTicket({
      name: params.get('name') || 'Asistente ELEVATE',
      code: params.get('code') || '',
      tier: tier,
      planLabel: params.get('plan') || (tier === 'GENERAL' ? 'Entrada general' : 'Entrada')
    });
    show(_t === 'guest' ? '¡Tu ticket está listo!' : '¡Gracias por tu registro!',
         'Te enviamos tu ticket por correo. Guarda, descarga o imprime tu ticket:');
    return;
  }

  // Compra VIP (Stripe)
  const sid = params.get('session_id');
  if(!sid){ fail(); return; }
  try {
    const d = await fetch('/api/session-status?session_id=' + encodeURIComponent(sid)).then(r=>r.json());
    if(d.payment_status !== 'paid' && d.status !== 'complete'){ fail('Tu pago aún no se ha confirmado.'); return; }

    const dual = d.plan === 'vip2' && d.second;
    makeTicket({
      blockTitle: dual ? 'Ticket 1 — Comprador' : '',
      name: d.name, code: d.code || sid.slice(-10).toUpperCase(),
      tier: 'VIP', planLabel: d.plan_label || 'Acceso preferencial'
    });
    if (dual) {
      makeTicket({
        blockTitle: 'Ticket 2 — Acompañante',
        name: d.second.name, code: d.second.code,
        tier: 'VIP', planLabel: 'VIP · Acompañante'
      });
    }
    show('¡Gracias por tu compra!',
         dual ? 'Tu lugar está confirmado. Aquí están los 2 tickets. Te los enviamos por correo; puedes descargarlos o imprimirlos:'
              : 'Tu lugar está confirmado. Te enviamos tu ticket por correo. Guarda, descarga o imprime tu ticket:');

    // Enviar correos (una sola vez por sesión)
    try {
      if (!localStorage.getItem('ticket_sent_' + sid)) {
        fetch('/api/send-ticket', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ session_id: sid }) });
        localStorage.setItem('ticket_sent_' + sid, '1');
      }
    } catch(e){}
  } catch(e){ fail('Error verificando la compra: ' + e.message); }
})();
</script>
</body>
</html>
